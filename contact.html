<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kiemme Sarah F. K | Portfolio</title>
  <link rel="stylesheet" href="style.css" />
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
</head>
<body class="light-theme">
  <header>
    <a href="#" class="logo">Portfolio</a>
    <nav class="navbar">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="projects.html">Projects</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </header>

  <section id="contact">
    <div class="contact">
        <h2 class="contact-title">Let's Connect!</h2>
    </div>
  </section>

  <section class="home-contact">
    <div class="contact-container" data-aos="fade-down" data-aos-duration="1000" data-aos-delay="500" data-aos-easing="ease-in">
      <form action="https://formsubmit.co/kiemmekoroh@gmail.com" method="POST">
        <input type="hidden" name="_captcha" value="false">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
  
        <label for="city">City</label>
        <input type="text" id="city" name="city" required>
  
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
  
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="4" required></textarea>
  
        <button type="submit">Send</button>
      </form>
    </div>
  </section>
  

  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script src="script.js"></script>
</body>
</html>
